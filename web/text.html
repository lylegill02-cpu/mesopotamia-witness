<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Read text — Mesopotamia Witness</title>
  <style>
    :root { --bg:#e8e4dc; --ink:#1a1814; --muted:#5a5348; --accent:#6b3a12; --card:#faf6ee; --border:#c9bfb0; }
    body { margin:0; font-family:Georgia,"Segoe UI",serif; background:var(--bg); color:var(--ink); line-height:1.65; }
    header { padding:1rem; border-bottom:2px solid var(--ink); background:var(--card); font-family:"Segoe UI",sans-serif; }
    nav a { color:var(--accent); margin-right:1rem; font-weight:600; }
    main { max-width:44rem; margin:0 auto; padding:1rem 1rem 3rem; }
    .progress { font-size:0.88rem; color:var(--muted); margin-bottom:0.75rem; font-family:"Segoe UI",sans-serif; }
    .panel { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1rem; margin-top:1rem; }
    .witness-delta { background:#ddd6c8; border:1px solid var(--border); border-radius:6px; padding:0.75rem; margin-bottom:1rem; font-family:"Segoe UI",sans-serif; font-size:0.88rem; }
    .witness-delta h4 { margin:0 0 0.5rem; font-size:0.75rem; text-transform:uppercase; color:var(--muted); }
    .witness-delta dt { font-size:0.72rem; text-transform:uppercase; color:var(--muted); margin-top:0.4rem; }
    .witness-delta dd { margin:0.1rem 0 0; line-height:1.45; }
    .witness-delta .trust { margin:0.5rem 0 0; padding:0.4rem; border-radius:4px; font-size:0.84rem; background:#f5e8e4; }
    h2 { margin:0 0 0.5rem; font-size:1.1rem; font-family:"Segoe UI",sans-serif; }
    h3 { margin:1rem 0 0.35rem; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); font-family:"Segoe UI",sans-serif; }
    .line { margin:0.2rem 0; font-size:1.02rem; }
    .line-num { color:var(--muted); font-size:0.82rem; margin-right:0.35rem; font-family:"Segoe UI",sans-serif; }
    .para { margin:0.65rem 0; font-size:1.02rem; }
    .para-range { font-size:0.78rem; color:var(--muted); font-family:"Segoe UI",sans-serif; }
    .ext { font-family:"Segoe UI",sans-serif; font-size:0.88rem; margin-top:1rem; }
    .ext a { color:var(--accent); margin-right:0.75rem; }
    .starter { font-style:italic; }
    .hidden { display:none; }
    .error { color:var(--accent); font-family:"Segoe UI",sans-serif; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">Loading…</h1>
    <nav>
      <a href="index.html">← Search</a>
      <a href="loci.html">Loci map</a>
    </nav>
  </header>
  <main>
    <div class="progress" id="progress"></div>
    <div id="error" class="error hidden"></div>
    <div id="content" class="hidden"></div>
  </main>
  <script type="module">
    import { openText, findLocus, renderWitnessDelta } from "./js/app.js";
    import { corpusUrl } from "./js/config.js";

    const params = new URLSearchParams(location.search);
    const textId = params.get("text_id");
    const ref = params.get("ref");
    const title = document.getElementById("title");
    const progress = document.getElementById("progress");
    const content = document.getElementById("content");
    const errorEl = document.getElementById("error");

    if (!textId && !ref) {
      title.textContent = "No text selected";
      errorEl.textContent = "Pick a text from search or the loci map.";
      errorEl.classList.remove("hidden");
    } else {
      try {
        let resolvedId = textId;
        let starter = null;
        if (!resolvedId && ref) {
          const cr = await fetch(corpusUrl());
          if (cr.ok) {
            const corpus = await cr.json();
            starter = corpus.refs?.[ref];
            resolvedId = starter?.text_id || null;
          }
        }

        const loc = await findLocus(resolvedId, ref);
        const witnessHtml = loc ? renderWitnessDelta(loc) : "";
        let bodyHtml = witnessHtml;

        if (resolvedId) {
          title.textContent = resolvedId;
          const text = await openText(resolvedId, (msg) => { progress.textContent = msg; });
          progress.textContent = "";
          if (!text) throw new Error("Text not found in index: " + resolvedId);
          title.textContent = text.title || text.text_id;
          document.title = (text.title || text.text_id) + " — Mesopotamia Witness";

          bodyHtml += `<div class="panel"><h2>${text.text_id}</h2>`;
          if (text.paragraphs?.length) {
            bodyHtml += `<h3>English (ETCSL)</h3>`;
            for (const p of text.paragraphs) {
              const range = p.line_range ? `Lines ${p.line_range}` : "";
              bodyHtml += `<div class="para"><span class="para-range">${range}</span><br>${p.translation}</div>`;
            }
          }
          if (text.lines?.length) {
            bodyHtml += `<h3>Transliteration</h3>`;
            for (const line of text.lines) {
              bodyHtml += `<div class="line"><span class="line-num">${line.line_label}</span>${line.transliteration}</div>`;
            }
          }
          bodyHtml += `</div>`;
        } else if (starter?.translation) {
          title.textContent = ref;
          bodyHtml += `<div class="panel starter"><h2>${ref}</h2><p>${starter.composition || ""}</p><p>${starter.translation}</p><p><em>${starter.source_note || ""}</em></p></div>`;
        } else {
          throw new Error("Could not resolve " + (textId || ref));
        }

        bodyHtml += `<p class="ext">
          <a href="https://etcsl.orinst.ox.ac.uk/" target="_blank" rel="noopener">ETCSL (Oxford)</a>
          <a href="https://cdli.earth/" target="_blank" rel="noopener">CDLI</a>
          <a href="https://oracc.museum.upenn.edu/" target="_blank" rel="noopener">ORACC</a>
        </p>`;
        content.innerHTML = bodyHtml;
        content.classList.remove("hidden");
      } catch (err) {
        progress.textContent = "";
        errorEl.textContent = err.message || "Failed to load";
        errorEl.classList.remove("hidden");
      }
    }
  </script>
</body>
</html>
