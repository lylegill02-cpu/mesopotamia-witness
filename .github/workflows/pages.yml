name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build static data
        run: |
          python scripts/merge_witness_deltas.py
          python scripts/sync_loci.py
          mkdir -p web/data
          cp data/loci_chart.json web/data/
          cp data/english_glossary.json web/data/english_glossary.json
          cp data/flood_comparison.json web/data/flood_comparison.json
          cp data/akkadian_catalog.json web/data/akkadian_catalog.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
